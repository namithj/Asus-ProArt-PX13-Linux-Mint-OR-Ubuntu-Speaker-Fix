Syntax 8

# ASUS ProArt PX13 (HN7306EAC) — mapeamento dos alto-falantes internos (TAS2783).
#
# PROBLEMA: o kernel MAINLINE (>= 7.x, driver snd-soc-tas2783-sdw já upstream)
# anuncia o card com componentes "cfg-amp:2 ... hs:rt721" mas SEM a tag
# "spk:tas2783". O kernel patcheado de maio/2026 adicionava essa tag via patch.
# Sem ela, o sof-soundwire/amd-soundwire.conf padrao deixa SpeakerCodecFile vazio
# e o profile HiFi nao expoe nenhuma porta "Speaker" -> PipeWire cai no sink dummy
# ("Saida de falsa") e nao ha som interno.
#
# POR QUE ISSO E DURAVEL (sobrevive a updates):
#   - Este arquivo e nomeado com o CardLongName e fica em conf.d/amd-soundwire/.
#     O UCM2 o carrega ANTES do amd-soundwire.conf padrao (ver ucm.conf, confd1).
#   - NENHUM pacote e "dono" dele -> o pacman NUNCA o apaga em updates de
#     alsa-ucm-conf, sof-firmware ou do kernel. Nao precisa mais recompilar
#     modulo de kernel nem reaplicar nada a cada update.
#   - Ele INCLUI o config padrao (rastreia mudancas upstream) e so forca o
#     codec de speaker = tas2783.
#
# Validado com: ALSA_CONFIG_UCM2=<tree> alsaucm -c 1 list _devices/HiFi
#   -> passa a listar "3: Speaker" alem de Headphones/Headset/Mic.

Include.base.File "/conf.d/amd-soundwire/amd-soundwire.conf"

# Forca o codec de speaker. Usar If.codec_default.Append.Define (mesma estrutura
# do config base) e o que efetivamente sobrescreve a variavel — um Define
# top-level simples apos o include NAO surte efeito (testado).
If.codec_default.Append.Define {
	SpeakerCodec1 "tas2783"
	SpeakerCodecFile "tas2783"
}

# Puxa o init do codec (define SpeakerMixerElem "tas2783 Speaker" e o remap
# estereo dos dois amps). O regex do bloco If.spk do config base nao inclui
# tas2783, entao incluimos aqui explicitamente.
Include.tas2783init.File "/codecs/tas2783/init.conf"

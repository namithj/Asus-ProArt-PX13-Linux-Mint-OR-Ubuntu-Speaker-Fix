Syntax 6

# ASUS ProArt PX13 (HN7306EAC) — full amd-soundwire override for Mint/Ubuntu.
#
# Stock kernels >= 7.1 expose the PX13 speakers as cfg-amp:2 without the
# spk:tas2783 tag that Mint's generic amd-soundwire.conf expects. Defining the
# speaker codec up front makes HiFi include sof-soundwire/tas2783.conf, and the
# extended spk_init regex below pulls in codecs/tas2783/init.conf for the mixer
# remap and stereo channel setup.

SectionUseCase."HiFi" {
	File "/sof-soundwire/HiFi.conf"
	Comment "Play HiFi quality Music"
}

Include.led.File "/common/ctl/led.conf"
Include.card-init.File "/lib/card-init.conf"
Include.ctl-remap.File "/lib/ctl-remap.conf"

Define {
	SpeakerCodec1 "tas2783"
	SpeakerChannels1 "2"
	SpeakerAmps1 "2"
	HeadsetCodec1 ""
	MicCodec1 ""
	Mics1 "0"
	MultiCodec1 ""
}

DefineRegex {
	HeadsetCodec {
		Regex " hs:([a-z0-9]+(-sdca)?)"
		String "${CardComponents}"
	}
	MicCodec {
		Regex " mic:([a-z0-9]+(-dmic)?+(-sdca)?)"
		String "${CardComponents}"
	}
	Mics {
		Regex " cfg-mics:([1-9][0-9]*)"
		String "${CardComponents}"
	}
	MultiCodec {
		Regex "(rt712|rt713|rt721|rt722|rt1320)"
		String "${var:SpeakerCodec1} ${var:HeadsetCodec1} ${var:MicCodec1}"
	}
}

If.multi_init {
	Condition {
		Type String
		Empty "${var:MultiCodec1}"
	}
	False {
		Define {
			MultiSpeakerShadow "${var:SpeakerCodec1}"
			MultiMicShadow "${var:MicCodec1}"
		}
		Include.multi_init.File "/codecs/${var:MultiCodec1}/init.conf"
	}
}

If.multi_speaker {
	Condition {
		Type RegexMatch
		Regex "=(${var:MultiCodec1}(-sdca)?)="
		String "=${var:SpeakerCodec1}="
	}
	True {
		Define.SpeakerCodec1 ""
	}
}

If.multi_mic {
	Condition {
		Type RegexMatch
		Regex "=(${var:MultiCodec1}(-sdca)?)="
		String "=${var:MicCodec1}="
	}
	True {
		Define.MicCodec1 ""
	}
}

If.multi_headset {
	Condition {
		Type RegexMatch
		Regex "=(${var:MultiCodec1}(-sdca)?)="
		String "=${var:HeadsetCodec1}="
	}
	True {
		Define.HeadsetCodec1 ""
	}
}

If.spk_init {
	Condition {
		Type RegexMatch
		Regex "(rt1318(-1)?|cs35l56(-bridge)?|tas2783)"
		String "${var:SpeakerCodec1}"
	}
	True.Include.spk_init.File "/codecs/${var:SpeakerCodec1}/init.conf"
}

If.hs_init {
	Condition {
		Type RegexMatch
		Regex "(cs42l43|cs42l45|rt5682|rt700|rt711|rt713(-sdca)?|rt722)"
		String "${var:HeadsetCodec1}"
	}
	True.Include.hs_init.File "/codecs/${var:HeadsetCodec1}/init.conf"
}

If.mic_init {
	Condition {
		Type RegexMatch
		Regex "(cs42l43-dmic|cs42l45-dmic|rt712-dmic|rt713-dmic|rt715(-sdca)?)"
		String "${var:MicCodec1}"
	}
	True.Include.mic_init.File "/codecs/${var:MicCodec1}/init.conf"
}

If.mic_init_rt715 {
	Condition {
		Type String
		Needle "rt715"
		Haystack "${var:MicCodec1}"
	}
	True.Macro [{ SetLED { LED="mic" Action="detach" CtlId="PGA5.0 5 Master Capture Switch" } }]
}

If.pga_init_pga2 {
	Condition {
		Type ControlExists
		Control "name='PGA2.0 2 Master Capture Switch'"
	}
	True.BootSequence [
		cset "name='PGA2.0 2 Master Capture Switch' 1"
	]
}

If.pga_init_pga5 {
	Condition {
		Type ControlExists
		Control "name='PGA5.0 5 Master Capture Switch'"
	}
	True.BootSequence [
		cset "name='PGA5.0 5 Master Capture Switch' 1"
	]
}

If.mics-array {
	Condition {
		Type String
		Empty "${var:Mics1}"
	}
	False.FixedBootSequence [
		 exec "-nhlt-dmic-info -o ${var:LibDir}/dmics-nhlt.json"
	]
}

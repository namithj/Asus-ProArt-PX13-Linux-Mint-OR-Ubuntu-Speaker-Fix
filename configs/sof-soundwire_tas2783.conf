# Speaker device for the TI TAS2783 SoundWire smart amps (ASUS ProArt PX13,
# HN7306). Upstream alsa-ucm-conf has no tas2783 profile. PCM device 2 is the
# SmartAmp playback device of the AMD SoundWire machine driver.
#
# Deliberately MINIMAL: it must NOT reference ${var:SpeakerMixerElem} or the
# ${var:Speaker*} amp macros. Those are only defined when the master
# sof-soundwire.conf includes /codecs/tas2783/init.conf, which happens only if
# SpeakerCodec1 is already set at that point in the parse. Because the codec is
# forced late (via the long-name override's appended Define), that include is
# skipped and any ${var:SpeakerMixerElem} reference here aborts the entire HiFi
# verb with -22 ("variable not defined in this context"). Volume is handled in
# software by PipeWire, so no PlaybackMixer/PlaybackMixerElem is needed.

SectionDevice."Speaker" {
	Comment "Speaker"

	# Stereo pair: assign one channel per amp via the 'Channel Playback' enum
	# (0=Off 1=Left 2=Right), the control added by the px13 DKMS module. Guarded
	# with ControlExists so a stock mainline driver (no such control) still gets
	# a working Speaker device instead of a failed profile.
	If.chansel {
		Condition {
			Type ControlExists
			Control "name='tas2783-1 Channel Playback'"
		}
		True {
			EnableSequence [
				cset "name='tas2783-1 Channel Playback' 1"
				cset "name='tas2783-2 Channel Playback' 2"
			]
		}
	}

	Value {
		PlaybackPriority 100
		PlaybackPCM "hw:${CardId},2"
		PlaybackChannels 2
	}
}

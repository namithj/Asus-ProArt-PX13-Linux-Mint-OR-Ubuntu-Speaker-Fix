# TAS2783 Use case Configuration for sof-soundwire card

#
# Arguments:
#   ForAmps - regex filter for var:SpeakerAmps
#   Amp - amplifier number (1,2 etc.)
#
DefineMacro.tas2783spk.If.0 {
    Condition {
        Type RegexMatch
        Regex "${var:__ForAmps}"
        String "${var:SpeakerAmps}"
    }
    True {
        EnableSequence [
            cset "name='tas2783-${var:__Amp} Amp Playback Switch' 1"
            cset "name='tas2783-${var:__Amp} Speaker Playback Switch' 1"
        ]
        DisableSequence [
            cset "name='tas2783-${var:__Amp} Amp Playback Switch' 0"
            cset "name='tas2783-${var:__Amp} Speaker Playback Switch' 0"
        ]
    }
}

SectionDevice."Speaker" {
    Comment "Speaker"

	# Stereo pair: assign one channel per amplifier via the
	# 'Channel Playback' enum (0=Off 1=Left 2=Right). The control only
	# exists on drivers carrying the channel-selection patch (nealstar's
	# series or the px13 DKMS module); guarded so stock mainline drivers
	# still get a (mono) Speaker device instead of a failed profile.
	If.chansel {
		Condition {
			Type ControlExists
			Control "name='tas2783-1 Channel Playback'"
		}
		True {
			EnableSequence [
				cset "name='tas2783-1 Channel Playback' 1"
				cset "name='tas2783-2 Channel Playback' 2"
			]
		}
	}

	DisableSequence [
#		cset "name='tas2783 Speaker Playback Switch' off"
	]

    Value {
        PlaybackPriority 100
        PlaybackPCM "hw:${CardId},2"
        PlaybackMixer "default:${CardId}"
        PlaybackMixerElem "${var:SpeakerMixerElem}"
    }
}

# TAS2783 codec init — control names differ between driver generations:
#   - nealstar patched kernels (px13):  'tas2783-N Speaker Playback Volume/Switch'
#   - mainline >= 7.1 driver:           'tas2783-N Speaker Volume' / 'Amp Volume'
# Both are handled below via ControlExists guards.

Define.SpeakerMixerElem "tas2783-1 Speaker"

# --- mainline (>= 7.1) driver: no switches, volumes named 'Speaker Volume' ---
If.mainlineTwoAmps {
    Condition {
        Type ControlExists
        Control "name='tas2783-2 Speaker Volume'"
    }
    True {
        Define.SpeakerMixerElem "tas2783 Speaker"
        LibraryConfig.remap.Config {
            ctl.default.map {
                "name='tas2783 Speaker Volume'" {
                    "name='tas2783-1 Speaker Volume'".vindex.0 0
                    "name='tas2783-2 Speaker Volume'".vindex.1 0
                }
                "name='tas2783 Amp Volume'" {
                    "name='tas2783-1 Amp Volume'".vindex.0 0
                    "name='tas2783-2 Amp Volume'".vindex.1 0
                }
            }
        }
    }
}

# --- nealstar patched (px13) kernels ---
If.px13TwoAmps {
    Condition {
        Type ControlExists
        Control "name='tas2783-2 Speaker Playback Volume'"
    }
    True {
        Define.SpeakerMixerElem "tas2783 Speaker"
        LibraryConfig.remap.Config {
            ctl.default.map {
                "name='tas2783 Speaker Playback Switch'" {
                    "name='tas2783-1 Speaker Playback Switch'".vindex.0 0
                    "name='tas2783-2 Speaker Playback Switch'".vindex.1 0
                }
                "name='tas2783 Speaker Playback Volume'" {
                    "name='tas2783-1 Speaker Playback Volume'".vindex.0 0
                    "name='tas2783-2 Speaker Playback Volume'".vindex.1 0
                }
            }
        }
    }
}

If.oneAmp {
    Condition {
        Type ControlExists
        Control "name='tas2783-1 Speaker Playback Switch'"
    }
    True.Macro[{ SetLED { LED="speaker" Action="attach" CtlId="tas2783-1 Speaker Playback Switch" } }]
}

If.twoAmps {
    Condition {
        Type ControlExists
        Control "name='tas2783-2 Speaker Playback Switch'"
    }
    True.Macro[{ SetLED { LED="speaker" Action="attach" CtlId="tas2783-2 Speaker Playback Switch" } }]
}
